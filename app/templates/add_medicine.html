{% extends "layout.html" %}
{% block content %}

<div class="page-header">
  <h1 class="page-title">Add <span>Medicine</span></h1>
  <a href="{{ url_for('main.medicines') }}" class="btn btn-outline">← Back to Inventory</a>
</div>

<div class="form-wrap">
  <h2>Medicine Details</h2>
  <form method="POST">

    <div class="form-group">
      <label>Medicine Name *</label>
      <input class="form-control" type="text" name="name" placeholder="e.g. PARACETAMOL 500MG" required autofocus>
    </div>

    <div class="form-group">
      <label>Company / Manufacturer</label>
      <input class="form-control" type="text" name="company" placeholder="e.g. Sun Pharma">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Selling Price (₹) *</label>
        <input class="form-control" type="number" step="0.01" name="price" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label>Purchase Price (₹)</label>
        <input class="form-control" type="number" step="0.01" name="purchase_price" placeholder="0.00">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Quantity *</label>
        <input class="form-control" type="number" name="quantity" placeholder="0" min="1" required>
      </div>
      <div class="form-group">
        <label>Batch Number *</label>
        <input class="form-control" type="text" name="batch_number" placeholder="e.g. BN2024001" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Expiry Date *</label>
        <input class="form-control" type="date" name="expiry_date" required>
      </div>
      <div class="form-group">
        <label>Supplier</label>
        <input class="form-control" type="text" name="supplier" placeholder="Supplier name">
      </div>
    </div>

    <p class="text-muted" style="font-size:12px; margin-bottom:16px;">
      💡 If this medicine already exists, its quantity will be increased and a new batch will be added.
    </p>

    <button type="submit" class="btn btn-primary btn-full">Save Medicine</button>
  </form>
</div>

{% endblock %}
