{% extends "layout.html" %}
{% block content %}

<div class="page-header">
  <h1 class="page-title">Edit <span>Medicine</span></h1>
  <a href="{{ url_for('main.medicines') }}" class="btn btn-outline">← Back</a>
</div>

<div class="form-wrap">
  <h2>Edit Details</h2>
  <form method="POST">
    <div class="form-group">
      <label>Medicine Name *</label>
      <input class="form-control" type="text" name="name" value="{{ med.name }}" required>
    </div>
    <div class="form-group">
      <label>Company</label>
      <input class="form-control" type="text" name="company" value="{{ med.company or '' }}">
    </div>
    <div class="form-group">
      <label>Selling Price (₹) *</label>
      <input class="form-control" type="number" step="0.01" name="price" value="{{ med.price }}" required>
    </div>
    <p class="text-muted" style="font-size:12px; margin-bottom:16px;">
      ℹ️ To add more stock, use the <a href="{{ url_for('main.purchases') }}" class="text-accent">Purchases</a> page.
    </p>
    <button type="submit" class="btn btn-primary btn-full">Update Medicine</button>
  </form>
</div>

{% endblock %}
